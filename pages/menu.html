<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>校園外送｜菜單</title>
    <link rel="stylesheet" href="../css/base.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="../index.html">校園外送</a>
      <nav aria-label="主要導覽"><a href="restaurants.html">餐廳</a><a href="cart.html">購物車 <span data-cart-count>0</span></a><a href="../index.html">首頁</a></nav>
    </header>
    <main class="container">
      <section class="page-heading"><p class="eyebrow">本日菜單</p><h1>晴天咖啡</h1><p class="muted">挑選餐點後，按下按鈕加入購物車。</p></section>
      <p class="status-message" data-status-message aria-live="polite"></p>
      <!-- 成員 3：將此區塊改為至少三張餐點卡片，每張需有名稱、價格和加入購物車按鈕。 -->
      <section class="menu-list">
        <article class="card">
          <h2>招牌雞腿飯</h2>
          <p>酥炸雞腿配滷汁與時蔬,附湯。</p>
          <p class="price">NT$ 120</p>
          <button data-add-to-cart="招牌雞腿飯" data-price="120">加入購物車</button>
        </article>
        <article class="card">
          <h2>日式豚骨拉麵</h2>
          <p>濃厚豚骨湯頭,叉燒兩片、溏心蛋一顆。</p>
          <p class="price">NT$ 150</p>
          <button data-add-to-cart="日式豚骨拉麵" data-price="150">加入購物車</button>
        </article>
        <article class="card">
          <h2>青醬松露義大利麵</h2>
          <p>手打青醬佐松露油,搭配蘑菇與帕瑪森起司。</p>
          <p class="price">NT$ 180</p>
          <button data-add-to-cart="青醬松露義大利麵" data-price="180">加入購物車</button>
        </article>
      </section>
    </main>
    <footer>校園外送小組協作練習</footer><script src="../js/app.js"></script>
  </body>
</html>
